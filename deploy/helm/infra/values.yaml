global:
  namespace: fluxer
  imagePullSecret: ghcr-pull-secret
  registry: ""

nats:
  replicas: 3
  image: nats
  tag: 2-alpine
  clientPort: 4222
  clusterPort: 6222
  monitorPort: 8222
  maxPayload: 64MB
  maxPending: 128MB
  maxConnections: 2048
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi

valkey:
  replicas: 1
  image: valkey/valkey
  tag: 8-alpine
  port: 6379
  maxmemory: 1600mb
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi

ingress:
  className: nginx
  hosts:
    api: api.fluxer.app
    apiCanary: api.canary.fluxer.app
    appProxy: web.fluxer.app
    appProxyCanary: web.canary.fluxer.app
    admin: admin.fluxer.app
    adminCanary: admin.canary.fluxer.app
    marketing: fluxer.app
    marketingCanary: canary.fluxer.app
    mediaProxy: fluxerusercontent.com
    staticProxy: fluxerstatic.com
    gateway: gateway.fluxer.app
    help: help.fluxer.app
    blog: blog.fluxer.app
    docs: docs.fluxer.app
    marketingAliases:
      - www.fluxer.app
      - fluxerapp.com
      - www.fluxerapp.com
      - fluxer.gg
      - fluxer.gift
      - fluxer.dev
      - www.fluxer.dev
      - every.day.im.fluxer.ing
    uploads: uploads.fluxer.app

ports:
  api: 8080
  apiCanary: 8080
  appProxy: 8080
  appProxyCanary: 8080
  admin: 8080
  adminCanary: 8080
  marketing: 8080
  marketingCanary: 8080
  docs: 8080
  mediaProxy: 8080
  staticProxy: 8080
  gateway: 8080
  uploads: 8080

# MaxMind GeoLite2 sync — daily at 05:17 UTC. Runtime services read
# these mmdb files out of the CDN bucket.
geoipSync:
  image: amazon/aws-cli:2.17.12
  schedule: '17 5 * * *'
  activeDeadlineSeconds: 1800
  backoffLimit: 2
  bucket: fluxer-geoip
  cityUpstreamUrl: https://git.io/GeoLite2-City.mmdb
  asnUpstreamUrl: https://git.io/GeoLite2-ASN.mmdb
  envSecret: fluxer-env-shared
